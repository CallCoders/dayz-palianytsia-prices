<style>
:root {

  --bg: #f5f4f1; --panel: #ffffff; --text: #23201c; --muted: #6b6560;

:root[data-theme="dark"] {

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 24px 16px 60px;
}
.wrap { max-width: 980px; margin: 0 auto; }
h1 {
  font-size: 1.5rem;
  margin: 0 0 4px;
}
.subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 16px;
  background: var(--bg);
  padding: 10px 0;
}
input[type="text"], select {
  font-size: 0.95rem;
  padding: 9px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text);
}
input[type="text"] { flex: 1 1 220px; min-width: 160px; }
select { flex: 0 1 200px; }
.stats { color: var(--muted); font-size: 0.85rem; margin-bottom: 10px; }
.table-scroll {
  overflow: auto;
  max-height: 70vh;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--panel);
}
table { border-collapse: collapse; width: 100%; min-width: 560px; }
thead th {
  position: sticky;
  top: 0;
  background: var(--accent-bg);
  color: var(--text);
  text-align: left;
  padding: 10px 12px;
  font-size: 0.85rem;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
}
thead th:hover { color: var(--accent); }
thead th.num { text-align: right; }
tbody td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 0.9rem;
  white-space: nowrap;
}
tbody td.name { white-space: normal; min-width: 180px; }
tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
tbody tr:hover { background: var(--row-hover); }
.buy { color: var(--buy); }
.sell { color: var(--sell); }
.dash { color: var(--muted); }
.seller-tag {
  font-size: 0.75rem;
  color: var(--muted);
}
.empty {
  padding: 30px;
  text-align: center;
  color: var(--muted);
}
footer {
  text-align: center;
  color: var(--muted);
  font-size: 0.8rem;
  margin-top: 24px;
}
</style>

let rows = [];
RAW.forEach(group => {
  group.items.forEach(item => {
    rows.push({
      seller: group.seller,
      category: group.category,
      name: item.name,
      buy: item.buy,
      sell: item.sell
    });
  });
});

const sellers = [...new Set(rows.map(r => r.seller))].sort((a,b)=>a.localeCompare(b,'uk'));
const sellerSelect = document.getElementById('sellerFilter');
sellers.forEach(s => {
  const o = document.createElement('option');
  o.value = s; o.textContent = s;
  sellerSelect.appendChild(o);
});

function updateCategoryOptions() {
  const sellerVal = sellerSelect.value;
  const cats = [...new Set(rows.filter(r => !sellerVal || r.seller === sellerVal).map(r => r.category))].sort((a,b)=>a.localeCompare(b,'uk'));
  const catSelect = document.getElementById('categoryFilter');
  const current = catSelect.value;
  catSelect.innerHTML = '<option value="">Усі категорії</option>';
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    catSelect.appendChild(o);
  });
  if (cats.includes(current)) catSelect.value = current;
}
updateCategoryOptions();

let sortKey = null, sortDir = 1;

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const sellerVal = sellerSelect.value;
  const catVal = document.getElementById('categoryFilter').value;

  let filtered = rows.filter(r => {
    if (sellerVal && r.seller !== sellerVal) return false;
    if (catVal && r.category !== catVal) return false;
    if (q && !r.name.toLowerCase().includes(q) && !r.seller.toLowerCase().includes(q)) return false;
    return true;
  });

  if (sortKey) {
    filtered.sort((a, b) => {
      let va = a[sortKey], vb = b[sortKey];
      if (sortKey === 'buy' || sortKey === 'sell') {
        va = va === null ? -Infinity : va;
        vb = vb === null ? -Infinity : vb;
        return (va - vb) * sortDir;
      }
      return String(va).localeCompare(String(vb), 'uk') * sortDir;
    });
  }

  const tbody = document.getElementById('rows');
  tbody.innerHTML = '';
  document.getElementById('emptyMsg').style.display = filtered.length ? 'none' : 'block';

  const frag = document.createDocumentFragment();
  filtered.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="seller-tag">${r.seller}</td>
      <td class="seller-tag">${r.category}</td>
      <td class="name">${r.name}</td>
      <td class="num">${r.buy !== null ? '<span class="buy">'+r.buy.toLocaleString('uk')+'</span>' : '<span class="dash">—</span>'}</td>
      <td class="num">${r.sell !== null ? '<span class="sell">'+r.sell.toLocaleString('uk')+'</span>' : '<span class="dash">—</span>'}</td>
    `;
    frag.appendChild(tr);
  });
  tbody.appendChild(frag);

  document.getElementById('stats').textContent = `${filtered.length} товарів із ${rows.length} · ${sellers.length} продавців`;
}

document.getElementById('search').addEventListener('input', render);
sellerSelect.addEventListener('change', () => { updateCategoryOptions(); render(); });
document.getElementById('categoryFilter').addEventListener('change', render);

document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.key;
    if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
    render();
  });
});

render();
</script>
